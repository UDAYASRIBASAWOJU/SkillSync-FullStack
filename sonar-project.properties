# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
#  SonarCloud \u2014 SkillSync Multi-Module Configuration
# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550

sonar.projectKey=UDAYASRIBASAWOJU_SkillSync-FullStack
sonar.organization=udaya-sri
sonar.projectName=SkillSync-FullStack

# \u2500\u2500 Source paths \u2500\u2500
sonar.sources=Backend/auth-service/src/main/java,\
  Backend/user-service/src/main/java,\
  Backend/skill-service/src/main/java,\
  Backend/session-service/src/main/java,\
  Backend/notification-service/src/main/java,\
  Backend/payment-service/src/main/java,\
  Backend/skillsync-cache-common/src/main/java,\
  Backend/config-server/src/main/java,\
  Backend/eureka-server/src/main/java,\
  Backend/api-gateway/src/main/java,\
  Frontend/src

# \u2500\u2500 Test paths \u2500\u2500
sonar.tests=Backend/auth-service/src/test/java,\
  Backend/user-service/src/test/java,\
  Backend/skill-service/src/test/java,\
  Backend/session-service/src/test/java,\
  Backend/notification-service/src/test/java,\
  Backend/payment-service/src/test/java,\
  Backend/skillsync-cache-common/src/test/java,\
  Backend/config-server/src/test/java,\
  Backend/eureka-server/src/test/java,\
  Backend/api-gateway/src/test/java,\
  Frontend/tests

# \u2500\u2500 Java settings \u2500\u2500
sonar.java.binaries=Backend/*/target/classes
sonar.java.test.binaries=Backend/*/target/test-classes
sonar.sourceEncoding=UTF-8

# Java libraries for SonarCloud (fixes unresolved types)
sonar.java.libraries=Backend/**/target/dependency/*.jar

# \u2500\u2500 JaCoCo coverage reports (XML) \u2014 aggregate report \u2500\u2500
sonar.coverage.jacoco.xmlReportPaths=Backend/target/site/jacoco-aggregate/jacoco.xml

# \u2500\u2500 Frontend LCOV coverage report \u2500\u2500
sonar.javascript.lcov.reportPaths=Frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=Frontend/coverage/lcov.info

# \u2500\u2500 Exclusions \u2500\u2500
sonar.exclusions=\
  **/node_modules/**,\
  **/target/**,\
  **/build/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/setupTests.ts,\
  **/jest.config.*,\
  **/vite.config.*

sonar.coverage.exclusions=\
  **/dto/**,\
  **/entity/**,\
  **/enums/**,\
  **/config/**,\
  **/*Application.java,\
  **/*Exception.java

# \u2500\u2500 Test file patterns \u2500\u2500
sonar.test.inclusions=\
  **/*Test.java,\
  **/*Tests.java,\
  **/*.test.ts,\
  **/*.test.tsx

# \u2500\u2500 Quality Gate \u2500\u2500
sonar.qualitygate.wait=true
